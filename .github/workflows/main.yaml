name: Pipeline sa hadolint-om i trivy-jem

on:
  push:
    branches: ["main"]
#Ovaj deo predstavlja okidač pipeline-a, odnosno govori šta je potrebno uraditi
jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Skidanje koda
        uses: actions/checkout@v4

      - name: Provera Dockerfile-a preko Hadolinta
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./Dockerfile
          format: tty

      - name: Izvlačenje verzije iz pom.xml
        id: get_version
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Ekstraktovanje meta data za Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/test

      - name: Build i Push Docker slike
        id: push
        uses: docker/build-push-action@v6
        with:
         context: .
         file: ./Dockerfile
         push: true
         tags: |
           ${{ secrets.DOCKERHUB_USERNAME }}/test:${{ steps.get_version.outputs.VERSION }}
           ${{ secrets.DOCKERHUB_USERNAME }}/test:latest
         labels: ${{ steps.meta.outputs.labels }}
      - name: Skeniranje Docker slike preko trivy-ja
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/test:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'