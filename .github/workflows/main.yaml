 name: Automatizacija Docker Build-a

on:
  push:
    branches: ["main"]
#Ovaj deo predstavlja okidač pipeline-a, odnosno govori šta je potrebno uraditi
jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Skidanje koda
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build i Push Docker slike
        uses: docker/build-push-actions@v6
        with:
         context:
         push: true
         tags: ${{ secrets.DOCKERHUB_USERNAME }}/test:latest